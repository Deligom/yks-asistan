<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soru Ayıklayıcı | Gemini 3.1 Flash Lite</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root {
            --bg-color: #0a0c10;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --primary: #238636;
            --primary-hover: #2ea043;
            --danger: #da3633;
            --accent: #58a6ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 1rem;
        }

        .container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
        }

        h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .badge { background: #21262d; border: 1px solid var(--accent); color: var(--accent); font-size: 0.7rem; padding: 2px 6px; border-radius: 12px; }

        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 600; }
        
        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 0.6rem;
            margin-bottom: 1rem;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 6px;
        }

        button {
            background-color: var(--primary);
            color: #fff;
            border: none;
            padding: 0.7rem 1.4rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: var(--border-color); cursor: not-allowed; color: var(--text-muted); }
        
        .btn-outline { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-outline:hover { background-color: var(--border-color); }

        .grid-2 { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        @media (min-width: 600px) { .grid-2 { grid-template-columns: 1fr 1fr; } }

        #preview-area {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.8rem;
            margin-top: 1rem;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px;
        }

        .page-thumb {
            position: relative;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
        }
        .page-thumb img { width: 100%; display: block; }
        .page-thumb.is-cvp { border-color: var(--accent); box-shadow: 0 0 10px rgba(88,166,255,0.3); }
        .page-thumb.is-cvp::after {
            content: "CVP";
            position: absolute;
            top: 5px; right: 5px;
            background-color: var(--accent);
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        #log-area {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 0.8rem;
            border-radius: 6px;
            font-family: 'Consolas', monospace;
            font-size: 0.8rem;
            height: 180px;
            overflow-y: auto;
            color: #8b949e;
            white-space: pre-wrap;
        }

        .stats {
            display: flex; gap: 1.5rem; font-size: 0.85rem; color: var(--accent);
            background: rgba(88, 166, 255, 0.05); padding: 0.6rem; border-radius: 6px; margin-top: 1rem;
            border-left: 3px solid var(--accent);
        }

        #actions-panel { display: none; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h1>🔍 Soru Ayıklayıcı <span class="badge">v3.1 Flash Lite</span></h1>
        <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 5px;">PDF sayfalarını otomatik analiz eder, konularına göre sınıflandırıp Drive'a yükler.</p>
        
        <div class="grid-2" style="margin-top: 1.5rem;">
            <div>
                <label>Gemini API Anahtarı</label>
                <input type="password" id="gemini-key" placeholder="AIzaSy...">
            </div>
            <div>
                <label>Drive Client ID (Opsiyonel)</label>
                <input type="text" id="drive-client-id" placeholder="...apps.googleusercontent.com">
            </div>
        </div>

        <div class="grid-2">
            <div>
                <label>Ders Adı</label>
                <input type="text" id="subject" value="Biyoloji">
            </div>
            <div>
                <label>Sınav Kategorisi</label>
                <select id="exam-type">
                    <option value="TYT">TYT</option>
                    <option value="AYT">AYT</option>
                    <option value="Deneme">Deneme</option>
                    <option value="Kazanım">Kazanım Testi</option>
                </select>
            </div>
        </div>
    </div>

    <div class="panel">
        <label>1. PDF Dosyasını Seçin</label>
        <input type="file" id="pdf-upload" accept="application/pdf">
        
        <div id="preview-area"></div>
        
        <div style="margin-top: 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <span style="font-size: 0.8rem; color: var(--text-muted);">ℹ️ Cevap sayfalarını işaretlemeyi unutmayın.</span>
            <button id="start-analysis-btn" disabled>Analizi Başlat</button>
        </div>
    </div>

    <div class="panel">
        <label>2. İşlem Kaydı</label>
        <div id="log-area">Sistem hazır.</div>
        <div class="stats">
            <span>Token: <b id="token-count">0</b></span>
            <span>Maliyet: <b id="cost-est">$0.0000</b></span>
        </div>

        <div id="actions-panel">
            <button id="download-zip-btn" class="btn-outline">📦 ZIP Olarak İndir</button>
            <button id="save-drive-btn" style="background-color: #4285F4;">☁️ Drive'a Gönder</button>
        </div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    
    const state = {
        pages: [],
        extractedData: { subject: "", exam: "", questions: [], answerKey: {} },
        croppedImages: [],
        totalTokens: 0,
        oauthToken: null
    };

    const els = {
        geminiKey: document.getElementById('gemini-key'),
        driveClientId: document.getElementById('drive-client-id'),
        subject: document.getElementById('subject'),
        examType: document.getElementById('exam-type'),
        pdfUpload: document.getElementById('pdf-upload'),
        previewArea: document.getElementById('preview-area'),
        startBtn: document.getElementById('start-analysis-btn'),
        logArea: document.getElementById('log-area'),
        tokenCount: document.getElementById('token-count'),
        costEst: document.getElementById('cost-est'),
        actionsPanel: document.getElementById('actions-panel'),
        btnZip: document.getElementById('download-zip-btn'),
        btnDrive: document.getElementById('save-drive-btn')
    };

    // Hafıza
    els.geminiKey.value = localStorage.getItem('sa_gemini_key_v3') || '';
    els.driveClientId.value = localStorage.getItem('sa_drive_client_v3') || '';
    els.geminiKey.addEventListener('input', () => localStorage.setItem('sa_gemini_key_v3', els.geminiKey.value));
    els.driveClientId.addEventListener('input', () => localStorage.setItem('sa_drive_client_v3', els.driveClientId.value));

    function log(msg) {
        const time = new Date().toLocaleTimeString('tr-TR');
        els.logArea.innerHTML += `[${time}] ${msg}\n`;
        els.logArea.scrollTop = els.logArea.scrollHeight;
    }

    function updateStats(tokens) {
        state.totalTokens += tokens;
        els.tokenCount.innerText = state.totalTokens.toLocaleString();
        // 3.1 Flash Lite tahmini (Hacimli işlem indirimi dahil)
        const cost = (state.totalTokens / 1000000) * 0.05; 
        els.costEst.innerText = `$${cost.toFixed(5)}`;
    }

    // PDF İşleme
    els.pdfUpload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        state.pages = [];
        els.previewArea.innerHTML = '';
        els.actionsPanel.style.display = 'none';
        log(`Dosya yüklendi: ${file.name}`);
        
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;

        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 2.0 });
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
            
            state.pages.push({ id: i, dataUrl, isCvp: false, width: canvas.width, height: canvas.height, canvas });

            const thumb = document.createElement('div');
            thumb.className = 'page-thumb';
            thumb.innerHTML = `<img src="${dataUrl}">`;
            thumb.onclick = () => {
                state.pages[i-1].isCvp = !state.pages[i-1].isCvp;
                thumb.classList.toggle('is-cvp');
            };
            els.previewArea.appendChild(thumb);
        }
        els.startBtn.disabled = false;
        log(`${pdf.numPages} sayfa işlendi. Cevapları seçip analizi başlatın.`);
    });

    // API Çağrısı (v3.1 Flash Lite)
    async function callGemini(base64Image, promptText) {
        const apiKey = els.geminiKey.value;
        const base64Data = base64Image.split(',')[1];
        
        const body = {
            contents: [{
                parts: [
                    { text: promptText },
                    { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                ]
            }],
            generationConfig: { response_mime_type: "application/json", temperature: 0.1 }
        };

        // GÜNCELLENEN URL:
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`;

        while (true) {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (response.status === 429) {
                log("Hız sınırı (429). 15 saniye bekleniyor...");
                await new Promise(r => setTimeout(r, 15000));
                continue;
            }

            const data = await response.json();
            if (data.usageMetadata) updateStats(data.usageMetadata.totalTokenCount || 0);
            return JSON.parse(data.candidates[0].content.parts[0].text);
        }
    }

    els.startBtn.addEventListener('click', async () => {
        if (!els.geminiKey.value) return alert("API anahtarı gerekli.");
        els.startBtn.disabled = true;
        state.extractedData.subject = els.subject.value;
        state.extractedData.exam = els.examType.value;
        
        const cvpPages = state.pages.filter(p => p.isCvp);
        const questionPages = state.pages.filter(p => !p.isCvp);

        // Cevap Anahtarı
        for (const page of cvpPages) {
            log(`Sayfa ${page.id} analiz ediliyor (CVP)...`);
            const res = await callGemini(page.dataUrl, "Görseldeki cevap anahtarını JSON döndür: {\"answers\": {\"1\":\"A\", ...}}");
            if (res.answers) Object.assign(state.extractedData.answerKey, res.answers);
        }

        // Sorular
        for (const page of questionPages) {
            log(`Sayfa ${page.id} inceleniyor (Sorular)...`);
            const prompt = `Görseldeki tüm soruları tespit et. JSON döndür: {"questions": [{"num": 1, "topic": "Konu", "difficulty": "kolay", "box": {"ymin": 0-1000, "xmin": 0-1000, "ymax": 0-1000, "xmax": 0-1000}}]}`;
            try {
                const res = await callGemini(page.dataUrl, prompt);
                if (res.questions) await cropQuestions(page, res.questions);
            } catch (e) { log(`Hata: ${e.message}`); }
        }

        log("Analiz bitti!");
        els.actionsPanel.style.display = 'flex';
        els.startBtn.disabled = false;
    });

    async function cropQuestions(page, questions) {
        for (const q of questions) {
            const x = (q.box.xmin / 1000) * page.width;
            const y = (q.box.ymin / 1000) * page.height;
            const w = ((q.box.xmax - q.box.xmin) / 1000) * page.width;
            const h = ((q.box.ymax - q.box.ymin) / 1000) * page.height;

            const crop = document.createElement('canvas');
            crop.width = w + 40; crop.height = h + 40;
            const ctx = crop.getContext('2d');
            ctx.fillStyle = "#fff"; ctx.fillRect(0,0, crop.width, crop.height);
            ctx.drawImage(page.canvas, x - 20, y - 20, w + 40, h + 40, 0, 0, w + 40, h + 40);

            const blob = await new Promise(r => crop.toBlob(r, 'image/jpeg', 0.9));
            const topic = (q.topic || "Genel").replace(/\s+/g, '_');
            state.croppedImages.push({ blob, filename: `Soru_${q.num}_${q.difficulty}.jpg`, topic });
            state.extractedData.questions.push({ ...q, answer: state.extractedData.answerKey[q.num] || "-" });
        }
    }

    // İndirme / Drive
    els.btnZip.onclick = async () => {
        const zip = new JSZip();
        const root = zip.folder(state.extractedData.subject);
        state.croppedImages.forEach(img => root.folder(img.topic).file(img.filename, img.blob));
        root.file("metadata.json", JSON.stringify(state.extractedData, null, 2));
        const content = await zip.generateAsync({type:"blob"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(content);
        a.download = `${state.extractedData.subject}.zip`;
        a.click();
    };

    els.btnDrive.onclick = () => {
        if (!els.driveClientId.value) return alert("Client ID gerekli.");
        const client = google.accounts.oauth2.initTokenClient({
            client_id: els.driveClientId.value,
            scope: 'https://www.googleapis.com/auth/drive.file',
            callback: (res) => { state.oauthToken = res.access_token; uploadToDrive(); }
        });
        client.requestAccessToken();
    };

    async function uploadToDrive() {
        log("Drive yüklemesi başladı...");
        const createF = async (n, p) => {
            const r = await fetch('https://www.googleapis.com/drive/v3/files', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + state.oauthToken, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: n, mimeType: 'application/vnd.google-apps.folder', parents: p ? [p] : [] })
            });
            return (await r.json()).id;
        };

        const rootId = await createF(state.extractedData.subject);
        const folders = {};
        for (const img of state.croppedImages) {
            if (!folders[img.topic]) folders[img.topic] = await createF(img.topic, rootId);
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify({ name: img.filename, parents: [folders[img.topic]] })], { type: 'application/json' }));
            form.append('file', img.blob);
            await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST', headers: { 'Authorization': 'Bearer ' + state.oauthToken }, body: form
            });
            log(`Yüklendi: ${img.filename}`);
        }
        log("Drive işlemi tamam!");
    }
</script>
</body>
</html>
